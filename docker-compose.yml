version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - VITE_GOOGLE_APPS_SCRIPT_URL=${VITE_GOOGLE_APPS_SCRIPT_URL}
      - VITE_GOOGLE_SHEETS_URL=${VITE_GOOGLE_SHEETS_URL}
      - VITE_SHEETS_NEWS_GID=${VITE_SHEETS_NEWS_GID:-0}

networks:
  noxh-network:
    driver: bridge
