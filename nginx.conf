server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;
    
    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Gzip compression (primary)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/javascript
        application/x-javascript 
        application/json
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;
    
    # Brotli compression (better than gzip)
    brotli on;
    brotli_comp_level 6;
    brotli_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/javascript
        application/x-javascript 
        application/json
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml;
    
    # Frontend (React SPA) - BrowserRouter support
    location / {
        root /var/www/noxh/dist;
        try_files $uri $uri/ /index.html;
        
        # HTML - no cache, always revalidate
        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate" always;
            expires -1;
        }
        
        # JavaScript bundles with hash - immutable cache
        location ~* \.(js|mjs)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            access_log off;
        }
        
        # CSS with hash - immutable cache
        location ~* \.css$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            access_log off;
        }
        
        # Images - long cache
        location ~* \.(png|jpg|jpeg|gif|webp|avif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000" always;
            access_log off;
        }
        
        # Fonts - immutable cache
        location ~* \.(woff|woff2|ttf|eot|otf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header Access-Control-Allow-Origin "*";
            access_log off;
        }
        
        # JSON data - short cache
        location ~* \.json$ {
            expires 1h;
            add_header Cache-Control "public, max-age=3600" always;
        }
    }
    
    # Backend API
    location /api {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Disable buffering for real-time responses
        proxy_buffering off;
    }
}
