server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Gzip compression (primary)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/javascript
        application/x-javascript 
        application/json
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;
    
    # Brotli compression (better than gzip, supported by modern browsers)
    brotli on;
    brotli_comp_level 6;
    brotli_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        application/javascript
        application/x-javascript 
        application/json
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml;
    
    # Frontend SPA routing - ALL routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
        
        # HTML - no cache, always revalidate
        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            expires -1;
        }
    }
    
    # JavaScript bundles with hash - immutable cache
    location ~* \.(js|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }
    
    # CSS with hash - immutable cache
    location ~* \.css$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
    }
    
    # Images - long cache with revalidation
    location ~* \.(png|jpg|jpeg|gif|webp|avif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000" always;
        access_log off;
    }
    
    # Fonts - immutable cache
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }
    
    # JSON data files - short cache
    location ~* \.json$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }
    
    # Proxy API requests to backend (if needed)
    location /api {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
